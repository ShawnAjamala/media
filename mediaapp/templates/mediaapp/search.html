{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <h2>Find Users</h2>
        <form method="get" action="{% url 'search' %}">
            <div class="input-group mb-3">
                <input type="text" class="form-control" name="query" placeholder="Search by username or bio" value="{{ query }}">
                <button class="btn btn-primary" type="submit">Search</button>
            </div>
        </form>
        {% if users %}
            <ul class="list-group">
                {% for user in users %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <a href="{% url 'profile' user.username %}">{{ user.username }}</a>
                        <span class="badge bg-primary rounded-pill">{{ user.profile.bio|truncatechars:30 }}</span>
                    </li>
                {% endfor %}
            </ul>
        {% elif query %}
            <div class="alert alert-warning">No users found.</div>
        {% endif %}
    </div>
</div>
{% endblock %}
