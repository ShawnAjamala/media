{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Welcome Back</h2>
                    <p class="text-muted">Sign in to continue</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            <input
                                type="{{ field.field.widget.input_type }}"
                                name="{{ field.name }}"
                                class="form-control form-control-lg {% if field.errors %}is-invalid{% endif %}"
                                placeholder="{{ field.field.widget.attrs.placeholder|default:field.label }}"
                                {% if field.value %}value="{{ field.value }}"{% endif %}
                                required
                            >
                            {% if field.errors %}
                                <div class="invalid-feedback">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Log In</button>
                </form>
                <p class="mt-3 text-center">
                    Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
